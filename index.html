<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>巡梦舱 DreamWalker</title>
    <meta
      name="description"
      content="巡梦舱 DreamWalker：每个梦，都值得被再次走过。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="ambientCanvas" aria-hidden="true"></canvas>
      <header class="topbar">
        <button class="brand" data-route="home" aria-label="返回首页">
          <span class="brand-mark">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"></path>
              <path d="M4 19c4.5-1.2 8.8-1.2 13 0"></path>
              <path d="M17.5 4.8h.01"></path>
            </svg>
          </span>
          <span>
            <strong>巡梦舱</strong>
            <small>DreamWalker</small>
          </span>
        </button>
        <nav class="nav">
          <button data-route="capture">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v10"></path><path d="M8 7a4 4 0 0 1 8 0v4a4 4 0 0 1-8 0V7Z"></path><path d="M5 11a7 7 0 0 0 14 0"></path><path d="M12 18v3"></path></svg>
            <span>捕捉</span>
          </button>
          <button data-route="gallery">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z"></path><path d="M8 10h.01"></path><path d="m10 16 3-3 2 2 2-3 3 4"></path></svg>
            <span>书架</span>
          </button>
          <button data-route="calendar">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v4"></path><path d="M17 3v4"></path><path d="M4 8h16"></path><path d="M5 5h14v16H5z"></path><path d="M16 14a3 3 0 1 1-3-3 2.4 2.4 0 0 0 3 3Z"></path></svg>
            <span>日历</span>
          </button>
        </nav>
        <button id="travelerSwitch" class="traveler-pill" type="button"></button>
      </header>

      <main id="app" class="view" aria-live="polite"></main>
    </div>

    <template id="sceneTemplate">
      <article class="scene-card">
        <canvas class="scene-canvas" aria-hidden="true"></canvas>
        <div class="scene-copy">
          <p class="scene-kicker"></p>
          <h3></h3>
          <p class="scene-text"></p>
          <div class="tag-row"></div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
